server:
  port: 8085

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        web-flux:
          routes[0]:
            id: AUTH-SERVICE
            uri: lb://AUTH-SERVICE
            predicates[0]:
              name: Path
              args[pattern]: /auth/**
          routes[1]:
            id: USER-SERVICE
            uri: lb://USER-SERVICE
            predicates[0]:
              name: Path
              args[pattern]: /user/**
          routes[2]:
            id: HOTEL-SERVICE
            uri: lb://HOTEL-SERVICE
            predicates[0]:
              name: Path
              args[pattern]: /hotel/**
          routes[3]:
            id: RATING-SERVICE
            uri: lb://RATING-SERVICE
            predicates[0]:
              name: Path
              args[pattern]: /rating/**


